<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Plato Inteligente — Completa tu perfil</title>
    <link rel="apple-touch-icon" href="assets/icon-192.png">
    <link rel="icon" href="assets/favicon-48.png" type="image/png">
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body class="bg">
  <div class="splash" id="splash" data-reveal=".profile-shell">
    <div class="splash-inner">
      <div class="splash-logo"><img src="assets/brand-logo.png" alt="Plato Inteligente"></div>
      <div class="splash-title">PLATO INTELIGENTE</div>
      <div class="splash-sub">Preparando tu perfil…</div>
      <div class="splash-pulse" aria-hidden="true"></div>
    </div>
  </div>

  <main class="profile-shell app-shell hidden" style="max-width:560px;margin:0 auto;padding:18px 16px 26px;">
    <header class="topbar" style="margin-bottom:14px;">
      <div class="topbar-left">
        <button class="icon-btn" id="btnBack" title="Volver" aria-label="Volver">
          <span class="icon">←</span>
        </button>
        <div>
          <div class="title">Completa tu perfil</div>
          <div class="subtitle">Esto mejora tu plan de comidas</div>
        </div>
      </div>
      <div class="topbar-right">
        <button class="pill" id="btnLogout">Salir</button>
      </div>
    </header>

    <section class="card">
      <div class="card-header">
        <h2>Datos personales</h2>
        <p class="muted">Usaremos esto para calcular objetivos y sugerencias.</p>
      </div>

      <form id="profileForm" class="form-grid">
        <label class="field">
          <span>Nombre</span>
          <input id="firstName" required placeholder="José" />
        </label>

        <label class="field">
          <span>Apellido</span>
          <input id="lastName" required placeholder="Dos Santos" />
        </label>

        <label class="field">
          <span>Edad</span>
          <input id="age" type="number" min="10" max="120" required placeholder="25" />
        </label>

        <label class="field">
          <span>Altura (cm)</span>
          <input id="heightCm" type="number" min="120" max="230" required placeholder="187" />
        </label>

        <label class="field">
          <span>Peso (kg)</span>
          <input id="weightKg" type="number" min="30" max="300" step="0.1" required placeholder="110" />
        </label>

        <label class="field">
          <span>Objetivo</span>
          <select id="goal">
            <option value="lose">Bajar de peso</option>
            <option value="maintain">Mantener</option>
            <option value="gain">Subir masa</option>
          </select>
        </label>

        <label class="field">
          <span>Nivel de actividad</span>
          <select id="activity">
            <option value="sedentary">Sedentario</option>
            <option value="light">Ligera</option>
            <option value="moderate">Moderada</option>
            <option value="high">Alta</option>
          </select>
        </label>

        <label class="field" style="grid-column:1/-1;">
          <span>Restricciones / preferencias (opcional)</span>
          <input id="prefs" placeholder="Ej: sin lactosa, sin gluten, vegetariano..." />
        </label>

        <div style="grid-column:1/-1;display:flex;gap:10px;justify-content:flex-end;margin-top:8px;">
          <button type="button" class="btn" id="btnSkip">Ahora no</button>
          <button type="submit" class="btn btn-primary">Guardar y continuar</button>
        </div>
      </form>
    </section>

    <p class="tiny muted" style="margin-top:12px;">
      Puedes editar estos datos luego en <b>Profile</b>.
    </p>
  </main>

  <script type="module">
    import { runSplash } from "./js/splash.js";
    runSplash({ durationMs: 650 });
  </script>
  <script type="module" src="js/profile-setup.js"></script>
</body>
</html>
