<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Configuración • Plato Inteligente</title>
    <link rel="apple-touch-icon" href="assets/icon-192.png">
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="icon" href="assets/favicon-48.png" type="image/png">
  <link rel="stylesheet" href="css/styles.css"/>
</head>
<body>
  <header class="topbar">
    <div class="topbar-left">
      <a class="icon-btn" href="./app.html" aria-label="Volver">←</a>
      <strong>Configuración</strong>
    </div>
    <button class="btn btn-ghost" id="btnLogout">Cerrar sesión</button>
  </header>

  <main class="container" style="padding-top:16px;">
    <section class="card" style="margin-bottom:14px;">
      <h2 style="margin-top:0;">Perfil</h2>
      <div id="profileView" class="muted">Cargando…</div>
      <div style="margin-top:10px;">
        <a class="btn" href="./profile.html">Editar perfil</a>
      </div>
    </section>

    <section class="card">
      <h2 style="margin-top:0;">Evolución de peso</h2>
      <p class="muted">Agregá tu peso para que la app pueda mostrar tu progreso.</p>

      <div class="row" style="display:flex;gap:10px;flex-wrap:wrap;align-items:end;">
        <div class="field" style="flex:1;min-width:160px;">
          <label for="weightNow">Peso actual (kg)</label>
          <input id="weightNow" type="number" step="0.1" placeholder="Ej: 110">
        </div>
        <button class="btn btn-primary" id="btnAddWeight">Agregar</button>
      </div>

      <div id="weightsList" style="margin-top:12px;" class="muted"></div>
    </section>
  </main>

  <script type="module" src="js/settings.js"></script>
</body>
</html>
